# Multi-H200 bf16 LoRA via DeepSpeed ZeRO-3. Set num_processes to your GPU count.
compute_environment: LOCAL_MACHINE
distributed_type: DEEPSPEED
deepspeed_config:
  deepspeed_config_file: gpt_oss/train/deepspeed_zero3.json
  zero3_init_flag: true
downcast_bf16: 'no'
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 8          # <-- set to number of H200s
rdzv_backend: static
same_network: true
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false

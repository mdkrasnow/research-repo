# CAFM-EqM post-training config: vanilla EqM-B/2 80ep → 10ep CAFM post-training.
# Reproduces Lin CAFM's hyperparameter recipe (arxiv 2604.11521) adapted for EqM.
# Phase 1b deliverable.

gen:
  model: EqM-B/2
  image_size: 256
  num_classes: 1000
  uncond: false
  ebm: false
  # Vanilla EqM-B/2 80ep trusted baseline (FID 31.41).
  checkpoint: projects/diff-EqM/results/stage_b_vanilla_in1k_80ep_seed0/000-EqM-B-2-Linear-velocity-None-vanilla/checkpoints/0380000.pt

dis:
  # γ-conditional discriminator using Lin's SiT Discriminator class via path
  # import. Matches DiT-B/2 architecture (130M params).
  model_kwargs:
    input_size: 32       # 32x32 latents at 256-res
    patch_size: 2
    in_channels: 4       # SD-VAE latents
    hidden_size: 768
    depth: 12
    num_heads: 12
    num_classes: 1000
    learn_sigma: false
    norm_type: rms       # CAFM default (vs SiT's layernorm)
  checkpoint: null       # train from scratch

vae:
  variant: ema           # stabilityai/sd-vae-ft-ema

data:
  path: /n/holylabs/ydu_lab/Lab/raywang4/imagenet/train
  image_size: 256
  num_workers: 4

training:
  seed: 0
  local_batch_size: 64   # 4 GPUs * 64 = 256 global, matches Lin CAFM
  gen_lr: 1.0e-5         # Lin CAFM default
  dis_lr: 1.0e-5
  total_steps: 50000     # ~10 ep on IN-1K with batch 256 ≈ 50K steps

adversarial:
  N: 16                  # 16 disc updates per gen update (Lin default)
  warmup: 1000           # first 1000 steps train disc only (Lin CAFM first 2 epochs)
  cp_scale: 0.001        # centering penalty
  ot_scale: 0.0          # OT regularization off for post-training (Lin default)

ema:
  decay: 0.99

# v10 mining hyperparameters (used only when --enable-v10 flag passed).
v10:
  lambda_v10: 0.1
  K: 1                   # FGSM-style (per Briglia 2025 + compute savings)
  eps_radius: 0.3        # CIFAR-validated regime
  lr: 0.05

persistence:
  dir: projects/diff-EqM/results/cafm_eqm_b2_in256_seed0
  interval: 5000         # ckpt every 5K steps

logging:
  interval: 100          # log every 100 steps

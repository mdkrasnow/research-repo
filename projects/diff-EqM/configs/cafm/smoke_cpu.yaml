# Local CPU smoke config — verifies code paths, no real training.
# Usage:
#   python projects/diff-EqM/experiments/cafm_eqm/train_cafm_eqm.py \
#     --config projects/diff-EqM/configs/cafm/smoke_cpu.yaml --smoke

gen:
  model: EqM-B/2
  image_size: 256
  num_classes: 1000
  uncond: false
  ebm: false
  checkpoint: null

dis:
  model_kwargs:
    input_size: 32
    patch_size: 2
    in_channels: 4
    hidden_size: 768
    depth: 12
    num_heads: 12
    num_classes: 1000
    learn_sigma: false
    norm_type: rms
  checkpoint: null

vae:
  variant: ema

data:
  path: null
  image_size: 256
  num_workers: 0

training:
  seed: 0
  local_batch_size: 2
  gen_lr: 1.0e-5
  dis_lr: 1.0e-5
  total_steps: 20

adversarial:
  N: 4
  warmup: 5
  cp_scale: 0.001
  ot_scale: 0.0

ema:
  decay: 0.99

v10:
  lambda_v10: 0.1
  K: 1
  eps_radius: 0.3
  lr: 0.05

persistence:
  dir: /tmp/cafm_eqm_smoke
  interval: 1000

logging:
  interval: 5
